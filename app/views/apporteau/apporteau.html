<div class="right_col" role="main">
  <div ng-controller="ApporteauApporteauCtrl as pc" class="modal-demo">
    <div id="myTabContent2" class="tab-content">
      <div>
        <!-- role="tabpanel" class="tab-pane fade active in" id="tab_content11" aria-labelledby="home-tab" -->

        <div class="breadcrumb-background-color">
          <ol class="breadcrumb">
            <li class="breadcrumb-item">
              <img src="../../images/water.svg" class="menu-icon" alt="" />
            </li>
            <li class="breadcrumb-item">
              <a> {{'Apport en eau' | translate}}</a>
            </li>
            <li class="breadcrumb-item">
              <b>{{'Apport en eau' | translate}}</b>
            </li>
          </ol>
        </div>


        <!--<span>
          {{'Apport en eau' | translate}} <i class="fa fa-angle-right"></i>
          <b></b></span>-->

        <center class="dontDisplay">
          <div id="filter_form" style="display: none" class="animated fadeIn selectpicker_widget">
            <table>
              <tr>
                <td>{{"De" | translate}}</td>
                <td>&nbsp;&nbsp;</td>
                <td>{{"A" | translate}}</td>
              </tr>
              <tr>
                <td>
                  <input id="date_debut" type="date" class="form-control input-sm" ng-model="date_debut" ng-change="pc.date_debut_change()" max="{{date_fin | date:'yyyy-MM-dd'}}" />
                </td>
                <td>&nbsp;&nbsp;</td>
                <td>
                  <input id="date_fin" type="date" class="form-control input-sm" ng-model="date_fin" ng-change="pc.date_fin_change()" max="{{current_date | date:'yyyy-MM-dd'}}" />
                </td>
              </tr>
            </table>
            <a class="btn" href="" ng-click="ReverseDisplay('filter_form')" title="{{'Cacher le formulaire' | translate}}"><i class="fa fa-chevron-down"></i></a>
          </div>
        </center>

        <div class="table-responsive;display:none" id="tableData">
          <table style="background-color: white" datatable="" dt-options="pc.dtOptions" dt-columns="pc.dtColumns" dt-instance="pc.dtInstance" class="table table-striped table-sm table-responsive-sm table-hover jambo_table bulk_action"></table>
          <br /><br />
        </div>
        <div class="flex-container" id="loadingData">
          <img src="././images/loading.gif" />
        </div>
      </div>

    </div>
  </div>
</div>
