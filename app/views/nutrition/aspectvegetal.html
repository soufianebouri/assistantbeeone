<div class="right_col" role="main">
  <div ng-controller="NutritionAspectvegetalCtrl as pc" class="modal-demo">
    <span> {{"Nutrition" | translate}} <i class="fa fa-angle-right"></i> <b>{{"Aspect végétal" | translate}}</b></span>

    <center class="dontDisplay">
      <div id="filter_form" style="display:none;" class="animated fadeIn selectpicker_widget">

        <table>
          <tr>
            <td>{{"Element mineral" | translate}}</td>
            <td>&nbsp;&nbsp;</td>
            <td>{{"Niveau carence" | translate}}</td>
            <td>&nbsp;&nbsp;</td>
            <td>{{"Parcelle" | translate}}</td>
            <td>&nbsp;&nbsp;</td>
            <td>{{"De" | translate}}</td>
            <td>&nbsp;&nbsp;</td>
            <td>{{"A" | translate}}</td>
          </tr>
          <tr>
            <td>
              <select id="element_mineral" class="form-control  input-sm selectpicker" data-actions-box='true' ng-model="element_mineral.element_mineral" ng-change="pc.element_mineral_change()" multiple data-live-search="true"
                title="{{'Element mineral' | translate}} ..." data-selected-text-format="count > 1" data-size="10">
                <option selected disabled value="" style="background-color: #ffffff;"> {{"Element mineral" | translate}} ..</option>
                <optgroup label="{{'element_mineral' | translate}}">
                  <option ng-repeat="element in pc.element_mineral_array" ng-value="element.ID">{{ element.Element_mineral}}</option>
                </optgroup>
              </select>
            </td>
            <td>&nbsp;&nbsp;</td>

            <td>
              <select id="niveau_carence" class="form-control  input-sm selectpicker" data-actions-box='true' ng-model="niveau_carence.niveau_carence" ng-change="pc.niveau_carence_change()" multiple data-live-search="true"
                title="{{'Niveau carence' | translate}} ..." data-selected-text-format="count > 1" data-size="10">
                <option selected disabled value="" style="background-color: #ffffff;"> {{"Niveau carence" | translate}} ..</option>
                <optgroup label="{{'niveau_carence' | translate}}">
                  <option ng-repeat="niveau_carence_item in pc.niveau_carence_array" ng-value="niveau_carence_item.ID">{{ niveau_carence_item.Niveau_Carence }}</option>
                </optgroup>
              </select>
            </td>
            <td>&nbsp;&nbsp;</td>

            <td>
              <select id="parcelle" class="form-control  input-sm selectpicker" ng-model="parcelle.parcelle" data-actions-box='true' ng-change="pc.parcelle_change()" multiple data-live-search="true" title="{{'Parcelle' | translate}} ..."
                data-selected-text-format="count > 1" data-size="10">
                <option selected disabled value="" style="background-color: #ffffff;"> {{"Parcelle" | translate}} ..</option>
                <optgroup label="{{'parcelle' | translate}}">
                  <option ng-repeat="parcelle in pc.parcelles_array" ng-value="parcelle.ID">{{ parcelle.Ref }}</option>
                </optgroup>
              </select>
            </td>
            <td>&nbsp;&nbsp;</td>

            <td>
              <input id="date_debut" type="date" class="form-control  input-sm" ng-model="date_debut" ng-change="pc.date_debut_change()" max="{{date_fin | date:'yyyy-MM-dd'}}">
            </td>
            <td>&nbsp;&nbsp;</td>
            <td>
              <input id="date_fin" type="date" class="form-control  input-sm" ng-model="date_fin" ng-change="pc.date_fin_change()" max="{{current_date | date:'yyyy-MM-dd'}}">
            </td>

          </tr>

        </table>
        <a class="btn" href="" ng-click="ReverseDisplay('filter_form')" title="{{'Cacher le formulaire' | translate}}"><i class="fa fa-chevron-down "></i></a>


      </div>
    </center>


    <div class="table-responsive">
      <table style="background-color: white" datatable="" dt-options="pc.dtOptions" dt-columns="pc.dtColumns" dt-instance="pc.dtInstance" class="table table-striped table-sm table-responsive-sm table-hover  jambo_table bulk_action ">
      </table>
    </div>
  </div>
</div>
