<div class="right_col" role="main">
  <div ng-controller="RecolteAgreagefruitoldCtrl as pc" class="modal-demo">
    <div ng-show="!details">
      <span> {{"Suivi qualitatif" | translate}} <i class="fa fa-angle-right"></i> <b>{{"Agréage des fruits ancienne version" | translate}}</b></span>
      <center class="dontDisplay">
        <div id="filter_form" style="display:none;" class="animated fadeIn selectpicker_widget">
          <table>
            <tr>
              <td>&nbsp;&nbsp;</td>
              <td>{{"De" | translate}}</td>
              <td>&nbsp;&nbsp;</td>
              <td>{{"A" | translate}}</td>
            </tr>
            <tr>
              <td>&nbsp;&nbsp;</td>
              <td>
                <input id="date_debut" type="date" class="form-control  input-sm" ng-model="date_debut" ng-change="pc.date_debut_change()" max="{{date_fin | date:'yyyy-MM-dd'}}">
              </td>
              <td>&nbsp;&nbsp;</td>
              <td>
                <input id="date_fin" type="date" class="form-control  input-sm" ng-model="date_fin" ng-change="pc.date_fin_change()" max="{{current_date | date:'yyyy-MM-dd'}}">
              </td>
            </tr>
          </table>
          <a class="btn" href="" ng-click="ReverseDisplay('filter_form')" title="{{'Cacher le formulaire' | translate}}"><i class="fa fa-chevron-down "></i></a>
        </div>
      </center>


      <div class="table-responsive">
        <table style="background-color: white" datatable="" dt-options="pc.dtOptions" dt-columns="pc.dtColumns" dt-instance="pc.dtInstance" class="table table-striped table-sm table-responsive-sm table-hover  jambo_table bulk_action ">
        </table>
      </div>


    </div>

  </div>
