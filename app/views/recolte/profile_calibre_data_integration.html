<div class="right_col" role="main">
    <div ng-controller="RecolteProfileCalibreDataIntegrationCtrl as pc" class="modal-demo">
      <span> {{'Suivi qualitatif' | translate}} <i class="fa fa-angle-right"></i> {{'Scoring' | translate}} <i class="fa fa-angle-right"></i> <b>{{'Intégration des Données de Profil Calibre' | translate}}</b> 
      </span>
  
      <center class="dontDisplay">
        <div id="filter_form"  class="animated fadeIn selectpicker_widget">
  
          <table>
            <tr>
                <td></td>
                <td>&nbsp;&nbsp;</td>
              <td>{{'De' | translate}}</td>
              <td>&nbsp;&nbsp;</td>
              <td>{{'A' | translate}}</td>
            </tr>
            <tr>
                <td>Famille : Arboriculture</td>
                <td>&nbsp;&nbsp;</td>
              <td>
                <input id="date_debut" type="date" class="form-control  input-sm" ng-model="date_debut" ng-change="pc.date_debut_change()" max="{{date_fin | date:'yyyy-MM-dd'}}">
              </td>
              <td>&nbsp;&nbsp;</td>
              <td>
                <input id="date_fin" type="date" class="form-control  input-sm" ng-model="date_fin" ng-change="pc.date_fin_change()" max="{{current_date | date:'yyyy-MM-dd'}}">
              </td>
  
            </tr>
  
          </table>
          <br ng-if="pc.data_to_clone.length==0">
          <md-button class="md-primary" ng-click="pc.clone_data()" ng-if="pc.data_to_clone.length>0">Enregistrer les {{pc.data_to_clone.length}} ligne(s) ci-dessous dans le scoring</md-button>
           
  
  
        </div>
      </center>
  
  
      <div class="table-responsive" ng-show="pc.showtable">
        <table style="background-color: white" datatable="" dt-options="pc.dtOptions" dt-columns="pc.dtColumns" dt-instance="pc.dtInstance" class="table table-striped table-sm table-responsive-sm table-hover  jambo_table bulk_action ">
        </table>
      </div>
    </div>
  
  </div>
