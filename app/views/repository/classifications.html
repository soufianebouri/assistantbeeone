<div class="right_col" role="main">
    <div ng-controller="RepositoryClassificationsCtrl as pc" class="modal-demo">
      <span class="dontshowit">{{'Paramétrage classifications' | translate}} </span>
      
      <center class="dontDisplay">
        <div id="filter_form" style="display:none;" class="animated fadeIn selectpicker_widget">
  
          <table>
            <tr>
              <td>Type variété</td>
            <tr>
              <td>
                <select id="typevariete" class="form-control  input-sm selectpicker" data-actions-box='true' ng-model="typevariete" ng-change="pc.typevariete_change()" multiple data-live-search="true" title="Type variété ..."
                  data-selected-text-format="count > 1" data-size="10">
                  <optgroup label="Type variété ...">
                    <option ng-repeat="all_typevariete in pc.all_typevariete" ng-value="all_typevariete.IDFamille_variete">{{ all_typevariete.Libile }}</option>
                  </optgroup>
                </select>
              </td> 
            </tr>
          </table>
          <a class="btn" href="" ng-click="ReverseDisplay('filter_form')" title="{{'Cacher le formulaire' | translate}}"><i class="fa fa-chevron-down "></i></a>
        </div>
      </center>
      <div class="table-responsive" ng-show="pc.showtable">
        <table style="background-color: white" datatable="" dt-options="pc.dtOptions" dt-columns="pc.dtColumns" dt-instance="pc.dtInstance" class="table table-striped table-sm jambo_table bulk_action">
        </table>
      </div>

    </div>
  </div>
