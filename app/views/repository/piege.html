<div class="right_col" role="main">
  <div ng-controller="RepositoryPiegeCtrl as pc" class="modal-demo">
    <span class="dontshowit">{{'Santé de la plante' | translate}} <i class="fa fa-angle-right"></i> <b>{{'Codification des pièges' | translate}}</b></span>
    <center class="dontDisplay">
      <div id="filter_form" style="display:none;" class="animated fadeIn selectpicker_widget">

        <table>
          <tr>
            <td>{{'Parcelle physique' | translate}}</td>
          <tr>
            <td>
              <select id="Parcellephysique" class="form-control  input-sm selectpicker" data-actions-box='true' ng-model="parcelle.parcelle" ng-change="pc.parcellephysique_change()" multiple data-live-search="true"
                title="{{'Parcelle physique' | translate}} ..." data-selected-text-format="count > 1" data-size="10">
                <optgroup label="{{'Parcelle physique' | translate}} ...">
                  <option ng-repeat="parcelle in pc.parcelles_array" ng-value="parcelle.ID">{{ parcelle.Ref }}</option>
                </optgroup>
              </select>
            </td>
          </tr>
        </table>
        <a class="btn" href="" ng-click="ReverseDisplay('filter_form')" title="{{'Cacher le formulaire' | translate}}"><i class="fa fa-chevron-down "></i></a>
      </div>
    </center>
    <div class="table-responsive">
      <table style="background-color: white" datatable="" dt-options="pc.dtOptions" dt-columns="pc.dtColumns" dt-instance="pc.dtInstance" class="table table-striped table-sm jambo_table bulk_action">
      </table>
    </div>
  </div>
</div>
