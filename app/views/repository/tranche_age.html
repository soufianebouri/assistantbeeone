<div class="right_col" role="main">

  <div ng-controller="RepositoryTrancheAgeCtrl as pc" class="modal-demo">
    <span> {{'Référentiel cultural' | translate}} <i class="fa fa-angle-right"></i>
      <b>{{'Référentiel des tranches dâge' | translate}}</b></span>
    <center class="dontDisplay">
      <div id="filter_form" style="display:none;" class="animated fadeIn selectpicker_widget">

        <table>
          <tr>
            <td>{{'Variété' | translate}}</td>
          <tr>
            <td>
              <select id="Variete" class="form-control  input-sm selectpicker" data-actions-box='true' ng-model="variete.variete" ng-change="pc.variete_change()" multiple data-live-search="true" title="{{'Variété' | translate}} ..."
                data-selected-text-format="count > 1" data-size="10">
                <optgroup label="{{'Variété' | translate}} ...">
                  <option ng-repeat="Variete in pc.Varietes" ng-value="Variete.ID">{{ Variete.Variete }}</option>
                </optgroup>
              </select>
            </td>
          </tr>
        </table>
        <a class="btn" href="" ng-click="ReverseDisplay('filter_form')" title="{{'Cacher le formulaire' | translate}}"><i class="fa fa-chevron-down "></i></a>
      </div>
    </center>
    <div class="table-responsive">
      <table style="background-color: white" datatable="" dt-options="pc.dtOptions" dt-columns="pc.dtColumns" dt-instance="pc.dtInstance" class="table table-striped table-sm jambo_table bulk_action">
      </table>
    </div>

  </div>
</div>
