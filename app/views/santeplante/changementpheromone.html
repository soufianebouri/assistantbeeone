<div class="right_col" role="main">
  <div ng-controller="SanteplanteChangementpheromoneCtrl as pc" class="modal-demo">
    <span> {{"Santé de la plante" | translate}} <i class="fa fa-angle-right"></i> <b>{{"Changement des phéromones" | translate}}</b></span>
    <center>
      <div id="filter_form" style="display:none;" class="animated fadeIn selectpicker_widget">

        <table>
          <tr>
            <td>{{"Cible" | translate}}</td>
            <td>&nbsp;&nbsp;</td>
            <td>{{"Piège" | translate}}</td>
            <td>&nbsp;&nbsp;</td>
            <td>{{"De" | translate}}</td>
            <td>&nbsp;&nbsp;</td>
            <td>{{"A" | translate}}</td>

            <td>&nbsp;&nbsp;</td>
            <td>&nbsp;&nbsp;</td>
          </tr>
          <tr>
            <td>
              <select id="cible" class="form-control  input-sm selectpicker" data-actions-box='true' ng-model="cible.cible" ng-change="pc.cible_change()" multiple data-live-search="true" title="{{'Cible' | translate}} ..."
                data-selected-text-format="count > 1" data-size="10">
                <option selected disabled value="" style="background-color: #ffffff;"> {{"Cible" | translate}} ..</option>
                <optgroup label="{{'Cible' | translate}}">
                  <option ng-repeat="cible in pc.cible_array" ng-value="cible.ID_cible">{{ cible.Cible }}</option>
                </optgroup>
              </select>
            </td>
            <td>&nbsp;&nbsp;</td>
            <td>
              <select id="Piege" class="form-control  input-sm selectpicker" data-actions-box='true' ng-model="piege.piege" ng-change="piege_change()" multiple data-live-search="true" title="{{'Piège' | translate}} ..."
                data-selected-text-format="count > 1" data-size="10">
                <option selected disabled value="" style="background-color: #ffffff;"> {{"Piège" | translate}} ..</option>
                <option ng-repeat="piege in pc.pieges" ng-value="piege.ID">{{ piege.Code_Piege }} {{(piege.isArchive) ? ' (Archivé)' : '(En cours)'}}</option>
              </select>
            </td>
            <td>&nbsp;&nbsp;</td>
            <td>
              <input id="date_debut" type="date" class="form-control  input-sm" ng-model="date_debut" ng-change="date_debut_change()" max="{{date_fin | date:'yyyy-MM-dd'}}">
            </td>
            <td>&nbsp;&nbsp;</td>
            <td>
              <input id="date_fin" type="date" class="form-control  input-sm" ng-model="date_fin" ng-change="date_fin_change()" max="{{current_date | date:'yyyy-MM-dd'}}">
            </td>
            <td>&nbsp;&nbsp;</td>
            <td>
              <md-button class="md-raised" ng-click="pc.search()">{{"Valider" | translate}}</md-button>
            </td>
          </tr>

        </table>
        <a class="btn" href="" ng-click="ReverseDisplay('filter_form')" title="{{'Cacher le formulaire' | translate}}"><i class="fa fa-chevron-down "></i></a>


      </div>
    </center>
    <div class="table-responsive">
      <table style="background-color: white" datatable="" dt-options="pc.dtOptions" dt-columns="pc.dtColumns" dt-instance="pc.dtInstance" class="table table-striped table-sm table-responsive-sm table-hover  jambo_table bulk_action ">
      </table>
    </div>
  </div>

</div>
