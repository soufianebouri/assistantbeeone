<div class="right_col" role="main">
  <div ng-controller="TlemetrieSaisieCtrl as pc" class="modal-demo">
    <md-content class="md-padding">
      <md-tabs md-selected="6" md-border-bottom="" md-autoselect="" md-swipe-content="">
        <md-tab label="{{'Prévu / réalisé' | translate}}" ui-sref="tableaudebord_prevision"></md-tab>
        <md-tab label="{{'Dernières mises à jours des prévisions' | translate}}" ui-sref="prevision_tabs_last_update_harvast"></md-tab>
        <md-tab label="{{'Détail des prévisions' | translate}}" ui-sref="prevision_tabs_harvast_detail"></md-tab>
        <md-tab label="{{'Détail des réalisations' | translate}}" ui-sref="prevision_tabs_realisation_detail"></md-tab>
        <md-tab label="{{'Prévu / réalisé par semaine' | translate}}" ui-sref="prevision_tabs_prevu_realise_semaine"></md-tab>
        <md-tab label="{{'Avancement semaine en cours' | translate}}" ui-sref="prevision_tabs_avancement_semaine_encours"></md-tab>
        <md-tab label="{{'Télémetrie de la saisie' | translate}}" ui-sref="tlemetrie_saisie"></md-tab>
        <md-tab label="{{'Qualité des prévisions hebdomadaires' | translate}}" ui-sref="qualite_prevision_hebdo"></md-tab>
      </md-tabs>
    </md-content>

    <div id="myTabContent2" class="tab-content">
      <br />
      <div role="tabpanel" class="tab-pane fade active in" id="tab_content11" aria-labelledby="home-tab">
        <div class="row" style="display: block; background-color:white;">
          <br />
          <center ng-show="pc.show_detail">
            <div style="width: 100px;">
              <select id="ferme_telemetrie" class="form-control  input-sm selectpicker" ng-model="ferme_telemetrie" ng-change="pc.fillDataTableDetail(pc.widget)" data-live-search="true" title="{{'Ferme' | translate}} ..." data-selected-text-format="count > 1"
                data-size="10">
                <option ng-repeat="ferme in pc.ferme_telemetrie_array" value="{{ferme}}">{{ ferme }}</option>
              </select>
            </div>
          </center>


          <br />
          <div class="col-md-4 col-sm-4" ng-click="pc.fillDataTableDetail(0)">
            <div class="x_panel">
              <div class="x_title">
                <h2 style="cursor: pointer;">{{"Aujourd'hui" | translate}} <small></small></h2>

                <div class="clearfix"></div>
              </div>
              <div class="x_content">
                <div class="table-responsive-no">
                  <div id="chartdiv_today"></div>
                </div>
              </div>
            </div>
          </div>

          <div class="col-md-4 col-sm-4" ng-click="pc.fillDataTableDetail(1)">
            <div class="x_panel">
              <div class="x_title">
                <h2 style="cursor: pointer;">{{"Demain" | translate}} <small></small></h2>

                <div class="clearfix"></div>
              </div>
              <div class="x_content">
                <div class="table-responsive-no">
                  <div id="chartdiv_tomorrow"></div>
                </div>
              </div>
            </div>
          </div>

          <div class="col-md-4 col-sm-4" ng-click="pc.fillDataTableDetail(2)">
            <div class="x_panel">
              <div class="x_title">
                <h2 style="cursor: pointer;">{{"Semaine prochaine" | translate}} <small></small></h2>

                <div class="clearfix"></div>
              </div>
              <div class="x_content">
                <div class="table-responsive-no">
                  <div id="chartdiv_next_week"></div>
                </div>
              </div>
            </div>
          </div>

          <div class="col-md-4 col-sm-4 col-md-offset-{{pc.widget * 4}} col-sm-offset-{{pc.widget * 4}}" ng-if="pc.show_detail">
            <table table style="background-color: white" class="table table-striped table-sm table-responsive-sm table-hover jambo_table bulk_action">
              <thead>
                <tr>
                  <th><button class="btn btn-danger btn-xs" ng-click="pc.show_detail = false;"><i class="fa fa-times" aria-hidden="true"></i></button></th>
                  <th style="text-align: center">{{"Ferme" | translate}}</th>
                  <th style="text-align: center">{{"Parcelles non saisies" | translate}}</th>
                </tr>
              </thead>
              <tbody>
                <tr ng-repeat="x in pc.detailFarms">
                  <td colspan="2" style="text-align: center">{{x.nomFerme}}</td>
                  <td style="text-align: center">{{x.parcNonsaisie}}</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
        <br><br>
      </div>
    </div>
  </div>
</div>
