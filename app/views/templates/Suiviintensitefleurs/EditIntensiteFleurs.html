<md-dialog aria-label="Mango (Fruit)" style="width: 70%;">
  <form ng-cloak novalidate>
    <md-toolbar>
      <div class="md-toolbar-tools">
        <h2>{{"Modifier" | translate}}</h2>
      </div>
    </md-toolbar>

    <md-dialog-content>
      <div class="md-dialog-content">
        <div layout="row" layout-wrap>
          <div flex="100" flex-gt-sm="33" layout="column">
            <md-input-container class="md-block" flex-gt-xs>
              <md-datepicker ng-model="datedecreation" md-placeholder="aaaa-mm-dd" readonly md-hide-icons="calendar" md-autofocus style="width: 250px;" required></md-datepicker>
            </md-input-container>
          </div>

          <div flex="100" flex-gt-sm="33" layout="column">
            <md-input-container class="md-block" flex-gt-xs>
              <label>{{"Parcelle culturale" | translate}} ...</label>
              <md-select ng-model="parcelleculturale" style="width: 250px;" required>
                <md-option ng-value="myParcelleCulturale.ID" ng-repeat="myParcelleCulturale in ParcelleCulturale" ng-selected="data.ID_ParcelleCulturale == myParcelleCulturale.ID">{{myParcelleCulturale.Ref}}</md-option>
              </md-select>
            </md-input-container>
          </div>

          <div flex="100" flex-gt-sm="33" layout="column">
            <md-input-container class="md-block" flex-gt-xs>
              <label>{{"Numéro d'arbre" | translate}}</label>
              <input ng-model="data.Num_Arbre" ng-min="0.000000001" style="width: 250px;" type="number" disabled required>
            </md-input-container>
          </div>

          <div flex="100" flex-gt-sm="33" layout="column">
            <md-input-container class="md-block" flex-gt-xs>
              <label>{{"Orientation" | translate}} ...</label>
              <md-select ng-model="orientation" style="width: 250px;" required>
                <md-option ng-value="orientation.key" ng-repeat="orientation in orientationArr" ng-selected="data.Orientation == orientation.name">{{orientation.name}}</md-option>
              </md-select>
            </md-input-container>
          </div>

          <div flex="100" flex-gt-sm="33" layout="column">
            <md-input-container class="md-block" flex-gt-xs>
              <label>{{"Nbr de fleur apical" | translate}}</label>
              <input ng-model="data.nbr_de_fleur_apical" style="width: 250px;" type="number" required>
            </md-input-container>
          </div>


          <div flex="100" flex-gt-sm="33" layout="column">
            <md-input-container class="md-block" flex-gt-xs>
              <label>{{"Nbr de fleur avec feuille" | translate}}</label>
              <input ng-model="data.nbr_de_fleur_avec_feuille" style="width: 250px;" type="number" required>
            </md-input-container>
          </div>

          <div flex="100" flex-gt-sm="33" layout="column">
            <md-input-container class="md-block" flex-gt-xs>
              <label>{{"Nbr de fleur aveugle" | translate}}</label>
              <input ng-model="data.nbr_de_fleur_aveugle" style="width: 250px;" type="number" required>
            </md-input-container>
          </div>

          <div flex="100" flex-gt-sm="33" layout="column">
            <md-input-container class="md-block" flex-gt-xs>
              <label>{{"Nbr de fleur feuilles" | translate}}
                < fleurs</label> <input ng-model="data.nbr_de_fleur_feuilles_inf_fleurs" style="width: 250px;" type="number" required>
            </md-input-container>
          </div>

          <div flex="100" flex-gt-sm="33" layout="column">
            <md-input-container class="md-block" flex-gt-xs>
              <label>{{"Nbr de fleur feuilles > fleurs" | translate}}</label> <input ng-model="data.nbr_de_fleur_feuilles_sup_fleurs" style="width: 250px;" type="number" required>
            </md-input-container>
          </div>

          <div flex="100" flex-gt-sm="33" layout="column">
            <md-input-container class="md-block" flex-gt-xs>
              <label>{{"Nbr de fleur grappe" | translate}}</label>
              <input ng-model="data.nbr_de_fleur_grappe" style="width: 250px;" type="number" required>
            </md-input-container>
          </div>

          <div flex="100" flex-gt-sm="33" layout="column">
            <md-input-container class="md-block" flex-gt-xs>
              <label>{{"Nbr de fleur solitaire" | translate}}</label>
              <input ng-model="data.nbr_de_fleur_solitaire" style="width: 250px;" type="number" required>
            </md-input-container>
          </div>





        </div>
    </md-dialog-content>

    <md-dialog-actions layout="row" style="">
      <span flex></span>
      <md-button ng-click="Annuler();" class="md-primary">
        {{"Annuler" | translate}}
      </md-button>
      <md-button ng-click="Modifier()" type="submit" ng-if="!progress">
        {{"Modifier" | translate}}
      </md-button>
      <md-progress-circular md-mode="indeterminate" ng-if="progress"></md-progress-circular>
    </md-dialog-actions>

  </form>
</md-dialog>
