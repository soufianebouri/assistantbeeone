<div ng-class="{'alert-success modal-header':pc.data.action == 'insert', 'alert-warning modal-header':pc.data.action != 'insert'}">
  <h3 class="modal-title" id="modal-title">
    <span ng-if="pc.data.action == 'insert'">{{pc.data.modalTitle.create}}</span>
    <span ng-if="pc.data.action != 'insert'">{{pc.data.modalTitle.update}}</span>
  </h3>
</div>
<div class="modal-body" id="modal-body" loading="pc.loading">

  <form name="colorationObject" ng-submit="pc.submitForm(colorationObject.$valid)" novalidate>

    <div class="form-group row">
      <label for="Niveau_Coloration" class="col-sm-2 col-xs-12 col-md-2  control-label">{{pc.data.niveau}}</label>
      <div class="col-sm-10 col-xs-12 col-md-10 ">
        <input type="text" class="form-control" name="Niveau_Coloration" id="Niveau_Coloration" ng-model="pc.coloration.Niveau_Coloration" required>
      </div>
    </div>
    <div class="form-group row">
      <label for="Culture" class="col-sm-2 col-xs-12 col-md-2  control-label">Culture</label>
      <div class="col-sm-10 col-xs-12 col-md-10 ">
        <select class="form-control" name="Culture" id="Culture" ng-model="pc.coloration.ID_Culture" data-live-search="true" required>
          <option ng-value="culture.ID" ng-repeat="culture in pc.data.CultureArray" ng-selected="pc.coloration.ID_Culture == culture.ID">{{culture.Culture}}</option>
        </select>
      </div>
    </div>

    <div class="alert alert-danger row" role="alert" ng-show="pc.errPushInsert != 'Error :'">
      {{pc.errPushInsert}}
    </div>

    <button type="submit" class="btn btn-primary" ng-disabled="colorationObject.$invalid">
      {{"Valider" | translate}}
    </button>
  </form>

</div>
<div class="modal-footer">
  <button class="btn btn-warning" type="button" ng-click="pc.cancel()">{{"Quitter" | translate}}</button>
</div>
