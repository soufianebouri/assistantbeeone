<div ng-class="{'alert-success modal-header':true}">
  <h3 class="modal-title" id="modal-title">
    <span>{{"Détails" | translate}} </span>
  </h3>
</div>
<div class="modal-body" id="modal-body">

  <table style="background-color: white" id="tableDataShow" border="1" class="table table-striped table-sm table-responsive-sm table-hover  jambo_table bulk_action  printtable">

    <tr>
      <th>{{"Parcelle culturale" | translate}}</th>
      <th>{{"Dose" | translate}}</th>
    </tr>

    <tr ng-repeat="(k,p) in pc.parcel track by k">
      <td>{{p}}</td>
      <td align="right">{{pc.dose_per_parcel[k]}} mm</td>
    </tr>



  </table>

</div>
<div class="modal-footer">
  <button class="btn btn-warning" type="button" ng-click="pc.cancel()">{{"Quitter" | translate}}</button>
</div>
