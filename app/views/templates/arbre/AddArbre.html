<md-dialog aria-label="Mango (Fruit)" style="width: 70%;">
  <form ng-cloak>
    <md-toolbar>
      <div class="md-toolbar-tools">
        <h2>{{'Ajouter un arbre' | translate}}</h2>
      </div>
    </md-toolbar>

    <md-dialog-content>
      <div class="md-dialog-content">
        <div layout="row" layout-wrap>

          <div flex="100" flex-gt-sm="33" layout="column">
            <md-input-container class="md-block" flex-gt-xs>
              <label>{{'Parcelle culturale ...' |translate}}</label>
              <md-select ng-model="culturale" style="width: 250px;" ng-change="setPolygone()" md-autofocus required>
                <md-option ng-value="ParcelleCultural" ng-repeat="ParcelleCultural in ParcellesCultural">{{ParcelleCultural.Ref}}</md-option>
              </md-select>
            </md-input-container>
          </div>

          <div flex="100" flex-gt-sm="33" layout="column">
            <md-input-container class="md-block" flex-gt-xs>
              <label>{{'Code Arbre' | translate}}</label>
              <input ng-model="code" style="width: 250px;" ng-value="" required>
            </md-input-container>
          </div>

          <div flex="100" flex-gt-sm="25" layout="column">
            <md-input-container class="md-block" flex-gt-xs>
              <label>{{'Date de plantation ...' | translate}}...</label>
              <input type="date" ng-model="dateplantation" style="width:90%;" required>
            </md-input-container>
          </div>


          <div flex="100" flex-gt-sm="33" layout="column">
            <md-input-container class="md-block" flex-gt-xs>
              <label>{{'Num de lot pépinière' | translate}}</label>
              <input ng-model="NumLotPepiniere" style="width: 250px;" type="text">
            </md-input-container>
          </div>

          <div flex="100" flex-gt-sm="33" layout="column">
            <md-input-container class="md-block" flex-gt-xs>
              <label>{{'QR code (Auto)' |translate}}</label>
              <table>
                <tr>
                  <td><input ng-model="qrcode" style="width: 150px;" type="text" required></td>
                  <td>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</td>
                  <td>
                    <div id="QrCodeImg"></div>
                  </td>
                </tr>
              </table>


            </md-input-container>
          </div>

          <div flex="100" flex-gt-sm="33" layout="column">
            <md-input-container class="md-block" flex-gt-xs>
              <label>{{'Statut (En cours / Arrachée)' |translate}}</label>
              <md-switch ng-model="statutArchive" style="width:90%;" aria-label="Switch 2" ng-true-value="1" ng-false-value="0" class="md-warn">
                <span class="badge-green_withe" ng-if="statutArchive == 0">{{'En cours' |translate}}</span>
                <span class="badge-red_withe" ng-if="statutArchive == 1">{{'Archivée' | translate}}</span>
              </md-switch>
            </md-input-container>
          </div>



          <div flex="100" flex-gt-sm="33" layout="column">
            <md-input-container class="md-block" flex-gt-xs>
              <label>{{'Latitude' | translate}}</label>
              <input ng-model="Latitude" style="width: 250px;" value="0" id="t1" name="t1" type="number">
            </md-input-container>
          </div>

          <div flex="100" flex-gt-sm="33" layout="column">
            <md-input-container class="md-block" flex-gt-xs>
              <label>{{'Longitude' | translate}}</label>
              <input ng-model="Longitude" style="width: 250px;" value="0" id="t2" name="t2" type="number">
            </md-input-container>
          </div>

          <br />
          <label class="control-label" for="basicinput"></label>
          {{'Positionnez votre arbre sur la parcelle culturale choisie' | translate}}
          <div id="parcellemap" style="width:100%;"></div>
          <br />


        </div>
    </md-dialog-content>

    <md-dialog-actions layout="row" style="">
      <span flex></span>
      <md-button ng-click="Annuler();" class="md-primary">
        {{'Annuler' |translate}}
      </md-button>
      <md-button ng-click="Ajouter()" ng-if="!progress" ng-disabled="!letmeclick">
        {{'Ajouter' | translate}}
      </md-button>
      <md-progress-circular md-mode="indeterminate" ng-if="progress"></md-progress-circular>
    </md-dialog-actions>

  </form>
</md-dialog>
