<md-dialog aria-label="ADATA formulaire" class="" id="model" style="width:100%;">
  <form ng-cloak name="formulaire">
    <md-toolbar>
      <div class="md-toolbar-tools" style="background-color: #58aa4a;">
        <h2>{{'Barémes' | translate}}</h2>
      </div>
    </md-toolbar>


    <md-dialog-content style="background-color: #DCDCDC">



      <div class="md-dialog-content">

        <div layout="row" layout-wrap>
          <div flex-gt-sm="100" flex="">

            <div class="form-body" layout-wrap>
              <md-content style="background-color:transparent">


                <div class="margin-left-input" layout="row" layout-wrap flex>

                  <div flex="100" flex-gt-sm="33" layout="column">
                    <md-input-container class="md-block" flex-gt-xs>
                      <label>{{'Référence' | translate}}</label>
                      <input ng-model="objAdd.reference" style="width:80%;" type="text" md-autofocus required>
                    </md-input-container>
                  </div>

                  <div flex="100" flex-gt-sm="25" layout="column">
                    <md-input-container class="md-block" flex-gt-xs>
                      <label>{{'Type variété' | translate}} ...</label>
                      <md-select ng-model="objAdd.typevariete_sel" ng-change="type_variete_check()" style="width:90%;" data-md-container-class="selectdemoSelectHeader" multiple required>
                        <!-- Select All Option -->


                        <md-select-header class="demo-select-header">
                          <input ng-model="searchTypeVariete" type="search" ng-keydown="$event.stopPropagation()" placeholder="{{'Rechercher' | translate}} .." class="demo-header-searchbox md-text">
                        </md-select-header>

                        <md-option ng-value="selectAll" ng-click="toggleSelectAll()">
                          {{'Select All' | translate}}
                        </md-option>

                        <md-option ng-value="typevariete.IDFamille_variete" ng-repeat="typevariete in typevarietes  | orderBy:'Libile' | filter:searchTypeVariete">{{typevariete.Libile}}
                        </md-option>
                      </md-select>
                    </md-input-container>
                  </div>


                </div>

                <div class="margin-left-input" layout="row" layout-wrap flex>

                  <div flex="100" flex-gt-sm="100" layout="column">
                    <table id="baremes" class="table table-bordered" style="width:100%;height: 100px;">
                      <thead>
                        <tr>
                          <th rowspan="2">
                            <center>Indicateur</center>
                          </th>
                          <th rowspan="2">
                            <center>Coef</center>
                          </th>
                          <th rowspan="2">
                            <center>Max note</center>
                          </th>
                          <th colspan="4">
                            <center>Barème</center>
                          </th>
                        </tr>
                        <tr>
                          <th style="background-color: yellow !important;">
                            <center>0</center>
                          </th>
                          <th style="background-color: rgb(175, 243, 149)  !important;">
                            <center>5</center>
                          </th>
                          <th style="background-color: rgb(70, 210, 228)  !important;">
                            <center>10</center>
                          </th>
                          <th style="background-color: rgb(228, 167, 248) !important;">
                            <center>15</center>
                          </th>
                        </tr>
                      </thead>
                      <tbody>

                        <tr ng-repeat="objAdds in objAdd.barems">
                          <td>
                            <label><br />{{objAdds.indicator}}</label>
                          </td>

                          <td>
                            <md-input-container class="md-block" flex-gt-xs>
                              <label>{{'Valeur' | translate}}</label>
                              <input ng-model="objAdds._coef" style="width:90%;" ng-change="no_negative($index)" type="number" required>
                            </md-input-container>
                          </td>
                          <td>
                            <center>
                              <label><br />
                                {{ (objAdds._max_note !== -1 && objAdds._max_note !== undefined && objAdds._max_note !== null && !isFinite(objAdds._max_note) && objAdds._max_note % 1 === 0) ? objAdds._max_note : '__' }}
                              </label>
                            </center>
                          </td>

                          <td style="background-color: yellow !important;">
                            <md-input-container class="md-block" flex-gt-xs>
                              <label>{{'Valeur' | translate}}</label>
                              <input ng-model="objAdds._0[1]" ng-change="updateMaxKey($index)" style="width:90%;" type="number">
                            </md-input-container>
                          </td>


                          <td style="background-color: rgb(175, 243, 149)  !important;">
                            <md-input-container class="md-block" flex-gt-xs>
                              <label>{{'Valeur' | translate}}</label>
                              <input ng-model="objAdds._5[1]" ng-change="updateMaxKey($index)" style="width:90%;" type="number">
                            </md-input-container>
                          </td>



                          <td style="background-color: rgb(70, 210, 228)  !important;">
                            <md-input-container class="md-block" flex-gt-xs>
                              <label>{{'Valeur' | translate}}</label>
                              <input ng-model="objAdds._10[1]" ng-change="updateMaxKey($index)" style="width:90%;" type="number">
                            </md-input-container>
                          </td>



                          <td style="background-color: rgb(228, 167, 248) !important;">
                            <md-input-container class="md-block" flex-gt-xs>
                              <label>{{'Valeur' | translate}}</label>
                              <input ng-model="objAdds._15[1]" ng-change="updateMaxKey($index)" style="width:90%;" type="number">
                            </md-input-container>
                          </td>

                        </tr>

                        <tr>
                          <td></td>
                          <td>&sum; Coef * Note max = </td>
                          <td>{{ total_note_max() }}</td>
                          <td></td>
                          <td></td>
                          <td></td>
                          <td></td>
                        </tr>


                      </tbody>
                    </table>

                  </div>

                </div>



              </md-content>
            </div>
          </div>

        </div>


      </div>


    </md-dialog-content>



    <md-dialog-actions layout="row" style="">
      <span flex></span>
      <md-button ng-click="Annuler();" class="md-primary">
        {{'Annuler' | translate}}
      </md-button>
      <md-button ng-click="Ajouter()" ng-show="!progress" ng-disabled="!letmeclick">
        {{'Ajouter' | translate}}
      </md-button>
      <md-button ng-click="Fullscreen();" class="md-primary">
        {{(!Ifullscreen) ? ('Fullscreen' | translate) : ('QuitterFullscreen' | translate)}}
      </md-button>
      <md-progress-circular md-mode="indeterminate" ng-show="progress"></md-progress-circular>
    </md-dialog-actions>
  </form>
</md-dialog>
