<md-dialog aria-label="Mango (Fruit)" style="width: 600px;">
  <form ng-cloak>
    <md-toolbar>
      <div class="md-toolbar-tools">
        <h2>{{'Ajouter un cycle cultural' | translate}}</h2>
      </div>
    </md-toolbar>

    <md-dialog-content>
      <div class="md-dialog-content">
        <div layout="row" layout-wrap>


          <div layout="row" layout-wrap flex>

            <div flex="100" flex-gt-sm="50" layout="column">
              <md-input-container class="md-block" flex-gt-xs>
                <label>{{'Code cycle' | translate}}</label>
                <input ng-model="code" ng-value="" md-autofocus required style="width:90%;">
              </md-input-container>
            </div>

            <div flex="100" flex-gt-sm="50" layout="column">
              <md-input-container class="md-block" flex-gt-xs>
                <label>{{'Date début ...' | translate}}</label>
                <md-datepicker ng-model="date_debut" style="width:90%;" md-hide-icons="calendar" md-placeholder="aaaa-mm-dd" readonly required></md-datepicker>
              </md-input-container>
            </div>

            <div flex="100" flex-gt-sm="50" layout="column">
              <md-input-container class="md-block" flex-gt-xs>
                <label>{{'Date fin ...' | translate}}</label>
                <md-datepicker ng-model="date_fin" style="width:90%;" md-hide-icons="calendar" md-placeholder="aaaa-mm-dd" readonly required></md-datepicker>
              </md-input-container>
            </div>


            <div flex="100" flex-gt-sm="50" layout="column">
              <md-input-container class="md-block" flex-gt-xs>
                <label>{{'Type cycle (Autres / Arboriculture)' |translate}}</label>
                <md-switch ng-model="Type" style="width:90%;" aria-label="Switch 2" ng-true-value="'arboriculture'" ng-false-value="'autres'" class="md-warn">
                  <span class="badge-green_withe" ng-if="Type == 'arboriculture'">{{'Arboriculture' | translate}}</span>
                  <span class="badge-red_withe" ng-if="Type == 'autres'">{{'Autres' |translate}}</span>
                </md-switch>
              </md-input-container>
            </div>

          </div>

        </div>

      </div>

    </md-dialog-content>

    <md-dialog-actions layout="row" style="">
      <span flex></span>
      <md-button ng-click="Annuler();" class="md-primary">
        {{'Annuler' | translate}}
      </md-button>
      <md-button ng-click="Ajouter()" ng-if="!progress">
        {{'Ajouter' | translate}}
      </md-button>
      <md-progress-circular md-mode="indeterminate" ng-if="progress"></md-progress-circular>
    </md-dialog-actions>

  </form>
</md-dialog>
