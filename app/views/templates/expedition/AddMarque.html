<md-dialog aria-label="ADATA formulaire" class="" id="model" style="width:50%;">
  <form ng-cloak>
    <md-toolbar>
      <div class="md-toolbar-tools" style="background-color: #58aa4a;">
        <h2>{{'Marque' | translate}}</h2>
      </div>
    </md-toolbar>


    <md-dialog-content style="background-color: #DCDCDC">

      <div class="md-dialog-content">

        <div layout="row" layout-wrap>
          <div flex-gt-sm="100" flex="">

            <div class="form-body" layout-wrap>
              <md-content style="background-color:transparent">

                <div class="margin-left-input" layout="row" layout-wrap flex>

                  <div flex="100" flex-gt-sm="50" layout="column">
                    <md-input-container class="md-block" flex-gt-xs>
                      <label>{{'Marque' | translate}} ...</label>
                      <input ng-model="Marque" style="width:95%;" type="text" required>
                    </md-input-container>
                  </div>

                  <div flex="100" flex-gt-sm="50" layout="column">
                    <md-input-container class="md-block" flex-gt-xs>
                      <label>{{'Code' | translate}} ...</label>
                      <input ng-model="Code" style="width:95%;" type="text">
                    </md-input-container>
                  </div>

                </div>


              </md-content>
            </div>
          </div>

        </div>


      </div>

    </md-dialog-content>

    <md-dialog-actions layout="row" style="">
      <span flex></span>
      <md-button ng-click="AnnulerMarque();" class="md-primary">
        {{'Annuler' | translate}}
      </md-button>
      <md-button ng-click="AjouterMarque()" ng-if="!progress">
        {{'Ajouter' | translate}}
      </md-button>
      <md-progress-circular md-mode="indeterminate" ng-if="progress"></md-progress-circular>
    </md-dialog-actions>
  </form>
</md-dialog>
