<md-dialog aria-label="Mango (Fruit)" style="width: 400px;">
  <form ng-cloak>
    <md-toolbar>
      <div class="md-toolbar-tools">
        <h2>{{"Modifier Bon d'expédition" | translate}}</h2>
      </div>
    </md-toolbar>

    <md-dialog-content>
      <div class="md-dialog-content">
        <div layout="row" layout-wrap>
          <div flex="100" flex-gt-sm="100" layout="column">
            <md-input-container class="md-block" flex-gt-xs>
              <label>{{"Bon d'expédition" | translate}}</label>
              <input ng-model="data.bon_expedition" type="text" md-autofocus required>
            </md-input-container>
          </div>


        </div>
    </md-dialog-content>

    <md-dialog-actions layout="row" style="">
      <span flex></span>
      <md-button ng-click="Annuler();" class="md-primary">
        {{'Annuler' | translate}}
      </md-button>
      <md-button ng-click="Modifier()">
        {{'Modifier' | translate}}
      </md-button>
    </md-dialog-actions>

  </form>
</md-dialog>
