<md-dialog aria-label="Mango (Fruit)" style="width:100%">
  <form ng-cloak>
    <md-toolbar>
      <div class="md-toolbar-tools">
        <h2>{{"Modifier réalisation fertilisation" | translate}}</h2>
      </div>
    </md-toolbar>

    <md-dialog-content>
      <div class="md-dialog-content">

        <div layout="row" layout-wrap>
          <div flex-gt-sm="100" flex="">
            <md-toolbar layout="row" class="md-hue-3" style="min-height: 30px !important; height: 30px !important;color: rgba(255, 255, 255, 0.87)  !important;">
              <small>&nbsp;&nbsp;{{"Information générale" | translate}}</small>
            </md-toolbar>
            <md-content style="background-color:transparent">
              <br />
              <div layout="row" layout-wrap flex>

                <div flex="100" flex-gt-sm="25" layout="column">
                  <md-input-container class="md-block" flex-gt-xs>
                    <label>{{"Ordre" | translate}} ...</label>
                    <input ng-model="data.Reference" style="width:90%;" readonly type="text">
                  </md-input-container>
                </div>


                <div flex="100" flex-gt-sm="30" layout="column">
                  <md-input-container class="md-block" flex-gt-xs>
                    <label>{{"Date de réalisation" | translate}} ...</label>
                    <md-datepicker ng-model="datefertilisation" style="width:90%;" md-placeholder="aaaa-mm-dd" readonly md-hide-icons="calendar" required></md-datepicker>
                  </md-input-container>
                </div>

              </div>

            </md-content>
          </div>

        </div>


        <div layout="row" layout-wrap>

          <div flex-gt-sm="100" flex="">
            <md-toolbar layout="row" class="md-hue-3" style="min-height: 30px !important; height: 30px !important;color: rgba(255, 255, 255, 0.87)  !important;">
              <small>&nbsp;&nbsp;{{"Parcelle culturale, Engrais" | translate}}</small>
            </md-toolbar>
          </div>
        </div>

        <div ng-repeat="food in foods | orderBy:'parcelleRef'">
          <br />
          <div layout="row" layout-wrap flex>
            <div style="height:25px" flex="100" flex-gt-sm="20" layout="column">
              <md-input-container class="md-block" flex-gt-xs>
                <label>{{"Parcelle culturale" | translate}}</label>
                <input ng-model="food.parcelleRef" style="width:90%;" readonly type="text">
              </md-input-container>
            </div>

            <div style="height:25px" flex="100" flex-gt-sm="20" layout="column">
              <md-input-container class="md-block" flex-gt-xs>
                <label>{{"Superficie(Ha)" | translate}}</label>
                <input ng-model="food.parcelleSup | number:2" style="width:90%;" class="right" readonly type="text">
              </md-input-container>
            </div>

            <div style="height:25px" flex="100" flex-gt-sm="20" layout="column">
              <md-input-container class="md-block" flex-gt-xs>
                <label>{{"Engrais" | translate}}</label>
                <input ng-model="food.engraisRef" style="width:90%;" readonly type="text">
              </md-input-container>
            </div>

            <div style="height:25px" flex="100" flex-gt-sm="15" layout="column">
              <md-input-container class="md-block" flex-gt-xs>
                <label>{{"Quantité order" | translate}} / {{(Mode_fert_ha) ? '(ha)' : ''}}</label>
                <input ng-model="food.quantiteOrdre" style="width:90%;" class="right"  readonly type="number">
              </md-input-container>
            </div>

            <div style="height:25px" flex="100" flex-gt-sm="15" layout="column">
              <md-input-container class="md-block" flex-gt-xs>
                <label>{{"Quantité réaliser" | translate}} / {{(Mode_fert_ha) ? '(ha)' : ''}}</label>
                <input ng-model="food.quantiteRealise" style="width:90%;" class="right" type="number">
              </md-input-container>
            </div>
          </div>
          <br />
        </div>




      </div>







    </md-dialog-content>

    <md-dialog-actions layout="row" style="">
      <span flex></span>
      <md-button ng-click="AnnulerSimple();" class="md-primary">
        {{"Annuler" | translate}}
      </md-button>
      <md-button ng-click="ModifierSimple()" ng-if="!progress">
        {{"Modifier" | translate}}
      </md-button>
      <md-progress-circular md-mode="indeterminate" ng-if="progress"></md-progress-circular>
    </md-dialog-actions>

  </form>
</md-dialog>
