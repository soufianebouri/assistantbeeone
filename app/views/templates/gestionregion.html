<div ng-class="{'alert-success modal-header':pc.data.action == 'insert', 'alert-warning modal-header':pc.data.action != 'insert'}">
  <h3 class="modal-title" id="modal-title">
    <span ng-if="pc.data.action == 'insert'">{{pc.data.modalTitle.create}}</span>
    <span ng-if="pc.data.action != 'insert'">{{pc.data.modalTitle.update}}</span>
  </h3>
</div>
<div class="modal-body" id="modal-body" loading="pc.loading">

  <form name="form" ng-submit="pc.submitForm(form.$valid)" novalidate>

    <div class="form-group row">
      <label for="Pays" class="col-sm-2 col-xs-12 col-md-2  control-label">{{pc.data.Pays}}</label>
      <div class="col-sm-10 col-xs-12 col-md-10 ">
        <select class="form-control input-sm" ng-change="pc.loadDataRegion()" name="Pays" id="Pays" ng-model="pc.obj.idP" required>
          <option value="{{Pays.ID}}" ng-repeat="Pays in pc.data.countriesArray track by $index" ng-selected="pc.obj.idP == Pays.ID">{{Pays.Pays}}</option>
        </select>
      </div>
    </div>

    <div class="form-group row">
      <label for="region" class="col-sm-2 col-xs-12 col-md-2  control-label">{{pc.data.region}}</label>
      <center>
        <div class="col-sm-10 col-xs-12 col-md-7 input-group">
          <select class="form-control input-sm" name="region" id="region" ng-model="pc.obj.idR" required>
            <option value="{{region.ID}}" ng-repeat="region in pc.data.regionArray" ng-selected="pc.obj.idR == region.ID">{{region.Region}}</option>
          </select>
          <div class="input-group-addon">
            <i class="fa fa-plus" ng-click="pc.addRegion()"></i>
          </div>
        </div>
      </center>

    </div>

    <div class="form-group row">
      <label for="zone" class="col-sm-2 col-xs-12 col-md-2  control-label">{{pc.data.zone}}</label>
      <div class="col-sm-10 col-xs-12 col-md-10 ">
        <input type="text" class="form-control" name="zone" id="zone" ng-model="pc.obj.Zone" required>
      </div>
    </div>

    <div class="alert alert-danger row" role="alert" ng-show="pc.errPushInsert != 'Error :'">
      {{pc.errPushInsert}}
    </div>

    <button type="submit" class="btn btn-primary" ng-disabled="form.$invalid">
      {{"Valider" | translate}}
    </button>
  </form>

</div>
<div class="modal-footer">
  <button class="btn btn-warning" type="button" ng-click="pc.cancel()">{{"Quitter" | translate}}</button>
</div>
