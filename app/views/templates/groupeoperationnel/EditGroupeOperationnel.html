<md-dialog aria-label="Mango (Fruit)" style="width: 400px;">
  <form ng-cloak novalidate>
    <md-toolbar>
      <div class="md-toolbar-tools">
        <h2>{{'Modifier groupe operationnel' | translate}}</h2>
      </div>
    </md-toolbar>

    <md-dialog-content>
      <div class="md-dialog-content">
        <div layout="row" layout-wrap>

          <div flex="100" flex-gt-sm="100" layout="column">
            <md-input-container class="md-block" flex-gt-xs>
              <label>{{'Intitule' | translate}}</label>
              <input ng-model="data.Intitule" ng-value="data.Intitule" md-autofocus required style="width:100%;">
            </md-input-container>
          </div>

        </div>
    </md-dialog-content>

    <md-dialog-actions layout="row" style="">
      <span flex></span>
      <md-button ng-click="Annuler();" class="md-primary">
        {{'Annuler' | translate}}
      </md-button>
      <md-button ng-click="Modifier()" type="submit" ng-if="!progress">
        {{'Modifier' | translate}}
      </md-button>
      <md-progress-circular md-mode="indeterminate" ng-if="progress"></md-progress-circular>
    </md-dialog-actions>

  </form>
</md-dialog>
