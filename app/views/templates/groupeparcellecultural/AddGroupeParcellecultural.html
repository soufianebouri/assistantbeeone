<md-dialog aria-label="Mango (Fruit)" style="width: 600px;">
  <form ng-cloak novalidate>
    <md-toolbar>
      <div class="md-toolbar-tools">
        <h2>{{'Groupe / Parcelle culturale' | translate}}</h2>
      </div>
    </md-toolbar>

    <md-dialog-content>
      <div class="md-dialog-content">
        <div layout="row" layout-wrap>

          <div flex="100" flex-gt-sm="50" layout="column">
            <md-input-container class="md-block" flex-gt-xs>
              <label>{{'Groupe ...' | translate}}</label>
              <md-select ng-model="groupe" style="width: 250px;" required>
                <md-option ng-value="myGroupes" ng-repeat="myGroupes in Groupes">{{myGroupes.Intitule}}</md-option>
              </md-select>
              <br />
              <div ng-if="groupe">
                <span class="badge-green_withe">
                  {{groupe.Intitule}}
                </span>
              </div>
            </md-input-container>
          </div>

          <div flex="100" flex-gt-sm="50" layout="column">
            <md-input-container class="md-block" flex-gt-xs>
              <label>{{'Parcelle culturale ...' | translate}}</label>
              <md-select ng-model="parcelleculturale" multiple style="width: 250px;" required>
                <md-option ng-value="myParcelleCulturale" ng-repeat="myParcelleCulturale in ParcelleCulturale">{{myParcelleCulturale.Ref}}</md-option>
              </md-select>
              <br />
              <div ng-if="parcelleculturale" ng-repeat="mypc in parcelleculturale">
                <span class="badge-blue-unclear_withe">
                  {{$index + 1}} {{mypc.Ref}}
                </span>
                <br />
              </div>
            </md-input-container>
          </div>


        </div>
    </md-dialog-content>

    <md-dialog-actions layout="row" style="">
      <span flex></span>
      <md-button ng-click="Annuler();" class="md-primary">
        {{'Annuler' | translate}}
      </md-button>
      <md-button ng-click="Ajouter()" type="submit" ng-if="!progress">
        {{'Affecter' | translate}}
      </md-button>
      <md-progress-circular md-mode="indeterminate" ng-if="progress"></md-progress-circular>
    </md-dialog-actions>

  </form>
</md-dialog>
