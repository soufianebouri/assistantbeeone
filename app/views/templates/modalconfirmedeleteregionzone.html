<div class="modal-header alert-danger">
  <h3 class="modal-title" id="modal-title">{{pc.data.confirme}}</h3>
</div>
<div class="modal-body" id="modal-body">
  <h2 class="text-danger">{{pc.data.confirmeDeleteText}}</h2>
</div>
<div class="modal-footer">
  <button type="button" class="btn btn-secondary" data-dismiss="modal" ng-click="pc.confirmeDelete(0)">{{"Quitter" | translate}}</button>
  <button type="button" class="btn btn-danger" ng-click="pc.confirmeDelete(1)">{{"Supprimer la region" | translate}}</button>
  <button type="button" class="btn btn-danger" ng-click="pc.confirmeDelete(2)">{{"Supprimer la zone" | translate}}</button>
</div>
