<md-dialog aria-label="Mango (Fruit)" style="width: 600px;">
  <form ng-cloak>
    <md-toolbar>
      <div class="md-toolbar-tools">
        <h2>{{'Upload' | translate}}</h2>
      </div>
    </md-toolbar>

    <md-dialog-content>
      <div class="md-dialog-content">
        <div layout="row" layout-wrap>

          <div flex="100" flex-gt-sm="100" layout="column">

            <!--<lf-ng-md-file-input id="fileUpload" lf-browse-label="Search" lf-remove-label="Delete" lf-drag-and-drop-label="Drag and Drop here!" lf-on-file-click="onFileClick" lf-on-file-remove="onFileRemove" lf-on-submit-click="onSubmitClick"
                submit drag preview progress></lf-ng-md-file-input>-->
            <!--<div class="file-field">
              <div class="mb-4">
                <center>
                  <input type="file" id="fileUpload" class="btn btn-info" width="100%" size="800px;" />
                  <input #csvInput hidden="true" type="file" onclick="this.value=null" (change)="csvInputChange($event)" accept=".csv" />
                  <button mat-flat-button color="primary" (click)="csvInput.click()">Choose Spreadsheet File (CSV)</button>
                </center>
              </div>
            </div>-->

            <choose-file layout="row">
              <input id="fileInput" type="file" class="ng-hide">
              <md-input-container flex class="md-block">
                <input type="text" ng-model="fileName" disabled>
                <div class="hint">{{'Select your file' | translate}}</div>
              </md-input-container>
              <div>
                <md-button id="uploadButton" class="md-fab md-mini">
                  <md-icon class="material-icons">{{'attach_file' | translate}}</md-icon>
                </md-button>
              </div>
            </choose-file>

          </div>

        </div>
        <br />
    </md-dialog-content>

    <md-dialog-actions layout="row">
      <span flex></span>
      <md-button ng-click="DownloadModele();" class="md-primary">
        <i class="fa fa-download"></i> {{'Importer un modèle' | translate}}
      </md-button>
      <md-button ng-click="Annuler();" class="md-primary">
        {{'Annuler' | translate}}
      </md-button>
      <md-button ng-click="Ajouter()">
        {{'Ajouter' | translate}}
      </md-button>
    </md-dialog-actions>
  </form>
</md-dialog>
