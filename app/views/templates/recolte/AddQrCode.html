<md-dialog aria-label="Mango (Fruit)" style="width: 50%;">
  <form ng-cloak>
    <md-toolbar>
      <div class="md-toolbar-tools">
        <h2>{{'QR code' | translate}}</h2>
      </div>
    </md-toolbar>

    <md-dialog-content>
      <div class="md-dialog-content">


        <md-tabs md-dynamic-height="" md-border-bottom="">
          <md-tab label="QR-code">

            <div class="md-dialog-content">


              <div layout="row" layout-wrap>




                <div flex="100" flex-gt-sm="33" layout="column">
                  <md-input-container class="md-block" flex-gt-xs>
                    <label>{{'Nombre de Caisses' | translate}}</label>
                    <input ng-model="nbrCaisse" style="width: 250px;" value="null" id="t1" name="t1" type="number" ng-change="changenbrCaisse()">
                  </md-input-container>
                </div>



                <div class="table-responsive container" id="printeable" ng-if="generating && nbrCaisse>0">

                  <div class="row">
                    <div ng-repeat="i in [].constructor(nbrCaisse) track by $index" style="page-break-inside: avoid;page-break-after:always;">
                      <!--<div class="clearfix" ng-if="$index % 10 == 0"></div>-->
                      <center>
                        <div class="col-sm-12 " style="background: lightgrey;  border: 1px solid grey; margin-bottom: 23px;">

                          <br />
                          <table table style="background-color: white;" id="tableDataShow" class="printtable">
                            <tr>
                              <td>
                                <div ng-attr-id="{{'qr-'+$index}}" ng-bind="generateQr($index+1,'qr-'+$index)"></div>
                              </td>

                            </tr>


                          </table>


                          <br />

                        </div>
                      </center>
                      <!--<div style='page-break-after:always' ng-if="$index % 10 == 0"></div>-->
                    </div>
                  </div>


                </div>
              </div>


            </div>
          </md-tab>

          <md-tab label="Références QR-Code">

            <div class="md-dialog-content">

              <div layout="row" layout-wrap>
                <div flex-gt-sm="100" flex="">

                  <div class="form-body" layout-wrap>
                    <md-content style="background-color:transparent">


                      <div class="form-body" layout="row" layout-wrap>
                        <div class="margin-left-input" flex-gt-sm="100" flex="">

                          <div flex="100" flex-gt-sm="33" layout="column">
                            <md-button ng-click="printExcel($e)" class="md-primary" ng-disabled="!nbrCaisse">
                              {{'Télécharger excel' |translate}}
                            </md-button>
                          </div>

                          <div layout="row" layout-wrap flex>
                            <div flex="80" flex-gt-sm="100" layout="column">
                              <div style="height:200px; overflow:auto;">
                                <table id="refQr" class="table table-striped" style="width:100%">
                                  <thead>
                                    <tr>
                                      <th>{{'Référence qr code' | translate}}</th>
                                    </tr>
                                  </thead>
                                  <tbody ng-if="nbrCaisse">
                                    <tr ng-repeat="i in [].constructor(nbrCaisse) track by $index">
                                      <td class="th-table">c-{{$index+1+''+ dateQr +''+ idUser}}</td>
                                    </tr>
                                  </tbody>

                                </table>
                              </div>
                            </div>
                          </div>



                        </div>





                      </div>


                    </md-content>
                  </div>
                </div>

              </div>


            </div>


          </md-tab>

        </md-tabs>


      </div>
    </md-dialog-content>

    <md-dialog-actions layout="row" style="">
      <span flex></span>
      <md-button ng-click="Annuler();" class="md-primary">
        {{'Annuler' |translate}}
      </md-button>
      <md-button ng-click="Generer()" class="md-primary" ng-disabled="!allowed">
        {{'Generer PDF' |translate}}
      </md-button>

      <md-progress-circular md-mode="indeterminate" ng-if="progress"></md-progress-circular>
    </md-dialog-actions>

  </form>
</md-dialog>
