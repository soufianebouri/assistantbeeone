<md-dialog aria-label="Mango (Fruit)" style="width: 300px;">
  <form ng-cloak>
    <md-toolbar>
      <div class="md-toolbar-tools">
        <h2>{{"Ajouter un mode d'irrigation" | translate}}</h2>
      </div>
    </md-toolbar>

    <md-dialog-content>
      <div class="md-dialog-content">
        <div layout="row" layout-wrap>
          <div flex="100" flex-gt-sm="100" layout="column">
            <md-input-container class="md-block" flex-gt-xs>
              <label>{{"Mode d'irrigation" | translate}}</label>
              <input ng-model="Libelle" type="text" md-autofocus required>
            </md-input-container>
          </div>

        </div>
    </md-dialog-content>

    <md-dialog-actions layout="row" style="">
      <span flex></span>
      <md-button ng-click="AnnulerModeIrrigation();" class="md-primary">
        {{"Annuler" | translate}}
      </md-button>
      <md-button ng-click="AjouterModeIrrigation()" ng-if="!progress">
        {{"Ajouter" | translate}}
      </md-button>
      <md-progress-circular md-mode="indeterminate" ng-if="progress"></md-progress-circular>
    </md-dialog-actions>

  </form>
</md-dialog>
