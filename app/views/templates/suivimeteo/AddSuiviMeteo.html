<md-dialog aria-label="ADATA formulaire" class="" id="model" style="width:100%;">
  <form ng-cloak>
    <md-toolbar>
      <div class="md-toolbar-tools" style="background-color: #58aa4a;">
        <h2>{{'AddSuiviMeteo' | translate}}</h2>
      </div>
    </md-toolbar>


    <md-dialog-content style="background-color: #DCDCDC">




      <div class="md-dialog-content">

        <div layout="row" layout-wrap>
          <div flex-gt-sm="100" flex="">

            <div class="form-body" layout-wrap>
              <md-content style="background-color:transparent">

                <div class="margin-left-input" layout="row" layout-wrap flex>
                  <div flex="100" flex-gt-sm="33" layout="column">
                    <md-input-container class="md-block" flex-gt-xs>
                      <label>{{'Date' | translate}}...</label>
                      <input type="date" ng-model="DateObservation" style="width:90%;" required>
                    </md-input-container>
                  </div>
                </div>

                <div class="margin-left-input" layout="row" layout-wrap flex>

                  <div flex="100" flex-gt-sm="20" layout="column">
                    <md-input-container style="height:0px" class="md-block" flex-gt-xs>
                      <label>{{'Tmin' | translate}} (°C) ...</label>
                      <input ng-model="Tmin" style="width:120px;" class="right" type="number" min="0" required>
                    </md-input-container>
                  </div>

                  <div flex="100" flex-gt-sm="20" layout="column">
                    <md-input-container style="height:0px" class="md-block" flex-gt-xs>
                      <label>{{'Tmax' | translate}} (°C) ...</label>
                      <input ng-model="Tmax" style="width:120px;" class="right" type="number" min="0" required>
                    </md-input-container>
                  </div>

                  <div flex="100" flex-gt-sm="20" layout="column">
                    <md-input-container style="height:0px" class="md-block" flex-gt-xs>
                      <label>{{'Tmoy' | translate}} (°C) ...</label>
                      <input ng-model="Tmoy" style="width:120px;" class="right" type="number" min="0">
                    </md-input-container>
                  </div>

                  <div flex="100" flex-gt-sm="20" layout="column">
                    <md-input-container style="height:0px" class="md-block" flex-gt-xs>
                      <label>{{'HR' | translate}} (%) ...</label>
                      <input ng-model="HR" style="width:120px;" class="right" type="number" min="0">
                    </md-input-container>
                  </div>

                  <div flex="100" flex-gt-sm="20" layout="column">
                    <md-input-container style="height:0px" class="md-block" flex-gt-xs>
                      <label>{{'Bac' | translate}} (mm) ...</label>
                      <input ng-model="Bac" style="width:120px;" class="right" type="number" min="0">
                    </md-input-container>
                  </div>

                  <div flex="100" flex-gt-sm="20" layout="column">
                    <md-input-container style="height:0px" class="md-block" flex-gt-xs>
                      <label>{{'HM' | translate}} (%) ...</label>
                      <input ng-model="HM" style="width:120px;" class="right" type="number" min="0">
                    </md-input-container>
                  </div>

                  <div flex="100" flex-gt-sm="20" layout="column">
                    <md-input-container style="height:0px" class="md-block" flex-gt-xs>
                      <label>{{'Pluvio' | translate}} (mm) ...</label>
                      <input ng-model="Pluvio" style="width:120px;" class="right" type="number" min="0">
                    </md-input-container>
                  </div>

                  <div flex="100" flex-gt-sm="20" layout="column">
                    <md-input-container style="height:0px" class="md-block" flex-gt-xs>
                      <label>{{'Rajout' | translate}} (mm) ...</label>
                      <input ng-model="Rajout" style="width:120px;" class="right" type="number" min="0">
                    </md-input-container>
                  </div>

                  <div flex="100" flex-gt-sm="20" layout="column">
                    <md-input-container style="height:0px" class="md-block" flex-gt-xs>
                      <label>{{'ETO' | translate}} (mm) ...</label>
                      <input ng-model="ETO" style="width:120px;" class="right" type="number" min="0">
                    </md-input-container>
                  </div>

                  <div flex="100" flex-gt-sm="20" layout="column">
                    <md-input-container style="height:0px" class="md-block" flex-gt-xs>
                      <label>{{'Vent' | translate}} (Km/h) ...</label>
                      <input ng-model="Vent" style="width:120px;" class="right" type="number" min="0">
                    </md-input-container>
                  </div>

                  <div flex="100" flex-gt-sm="20" layout="column">
                    <md-input-container style="height:0px" class="md-block" flex-gt-xs>
                      <label>{{'Baromètre' | translate}} (Bar) ...</label>
                      <input ng-model="Barometre" style="width:120px;" class="right" type="number" min="0">
                    </md-input-container>
                  </div>

                  <div flex="100" flex-gt-sm="20" layout="column">
                    <md-input-container style="height:0px" class="md-block" flex-gt-xs>
                      <label>{{'RG' | translate}} (W/m<sup>2</sup>) ...</label>
                      <input ng-model="RG" style="width:120px;" class="right" type="number" min="0">
                    </md-input-container>
                  </div>

                  <div flex="100" flex-gt-sm="60" layout="column">
                    <md-input-container class="md-block">
                      <label>{{'Observations' | translate}}</label>
                      <textarea ng-model="Observation" md-maxlength="50" rows="3" md-select-on-focus style="width:90%;"></textarea>
                    </md-input-container>
                  </div>


                </div>


              </md-content>
            </div>
          </div>

        </div>


      </div>










    </md-dialog-content>

    <md-dialog-actions layout="row" style="">
      <span flex></span>
      <md-button ng-click="Annuler();" class="md-primary">
        {{'Annuler' | translate}}
      </md-button>
      <md-button ng-click="Ajouter()" ng-if="!progress">
        {{'Ajouter' | translate}}
      </md-button>
      <md-button ng-click="Fullscreen();" class="md-primary">
        {{(!Ifullscreen) ? ('Fullscreen' | translate) : ('Quitter Fullscreen' | translate)}}
      </md-button>
      <md-progress-circular md-mode="indeterminate" ng-if="progress"></md-progress-circular>
    </md-dialog-actions>
  </form>
</md-dialog>
