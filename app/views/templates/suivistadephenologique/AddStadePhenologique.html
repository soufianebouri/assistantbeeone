<md-dialog aria-label="Mango (Fruit)" style="width: 70%;">
  <form ng-cloak novalidate>
    <md-toolbar>
      <div class="md-toolbar-tools">
        <h2>{{'Ajouter un stades phénologiques' | translate}} </h2>
      </div>
    </md-toolbar>

    <md-dialog-content>
      <div class="md-dialog-content">
        <div layout="row" layout-wrap>
          <div flex="100" flex-gt-sm="33" layout="column">
            <md-input-container class="md-block" flex-gt-xs>
              <md-datepicker ng-model="datedecreation" md-placeholder="aaaa-mm-dd" readonly md-hide-icons="calendar" md-autofocus style="width: 250px;" required></md-datepicker>
            </md-input-container>
          </div>

          <div flex="100" flex-gt-sm="33" layout="column">
            <md-input-container class="md-block" flex-gt-xs>
              <label>{{'Parcelle culturale ...' | translate}}</label>
              <md-select ng-model="parcelleculturale" style="width: 250px;" multiple="" required>
                <md-option ng-value="myParcelleCulturale.ID" ng-repeat="myParcelleCulturale in ParcelleCulturale">{{myParcelleCulturale.Ref}}</md-option>
              </md-select>
            </md-input-container>
          </div>

          <div flex="100" flex-gt-sm="33" layout="column">
            <md-input-container class="md-block" flex-gt-xs>
              <label>{{'Stade ...' | translate}}</label>
              <md-select ng-model="stade" style="width: 250px;" required>
                <md-option ng-value="myRefStadePhenologique.IDStade_phenologique" ng-repeat="myRefStadePhenologique in RefStadePhenologique">{{myRefStadePhenologique.code}}</md-option>
              </md-select>
            </md-input-container>
          </div>

          <div flex="100" flex-gt-sm="33" layout="column">
            <md-input-container class="md-block" flex-gt-xs>
              <label>{{'Qualité ...' | translate}}</label>
              <md-select ng-model="qualite" style="width: 250px;" required>
                <md-option ng-value="myQualiteStade.ID" ng-repeat="myQualiteStade in QualiteStade">{{myQualiteStade.Qualite_Stade}}</md-option>
              </md-select>
            </md-input-container>
          </div>

          <div flex="100" flex-gt-sm="33" layout="column">
            <md-input-container class="md-block" flex-gt-xs>
              <label>{{'Intensité ...' | translate}}</label>
              <md-select ng-model="intensite" style="width: 250px;" required>
                <md-option ng-value="myIntensiteStade.ID" ng-repeat="myIntensiteStade in IntensiteStade">{{myIntensiteStade.Intensite_Stade}}</md-option>
              </md-select>
            </md-input-container>
          </div>


          <div flex="100" flex-gt-sm="33" layout="column">
            <md-input-container class="md-block">
              <label>{{'Description' | translate}}</label>
              <textarea ng-model="Description" rows="3"></textarea>
            </md-input-container>
          </div>

        </div>
    </md-dialog-content>

    <md-dialog-actions layout="row" style="">
      <span flex></span>
      <md-button ng-click="Annuler();" class="md-primary">
        {{'Annuler' | translate}}
      </md-button>
      <md-button ng-click="Ajouter()" type="submit" ng-if="!progress">
        {{'Ajouter' | translate}}
      </md-button>
      <md-progress-circular md-mode="indeterminate" ng-if="progress"></md-progress-circular>
    </md-dialog-actions>
