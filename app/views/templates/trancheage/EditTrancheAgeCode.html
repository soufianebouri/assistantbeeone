<md-dialog aria-label="Mango (Fruit)" style="width: 300px;">
  <form ng-cloak>
    <md-toolbar>
      <div class="md-toolbar-tools">
        <h2>{{"Modifier le code tranche âge" | translate}}</h2>
      </div>
    </md-toolbar>

    <md-dialog-content>
      <div class="md-dialog-content">
        <div layout="row" layout-wrap>
          <div flex="100" flex-gt-sm="100" layout="column">
            <md-input-container class="md-block" flex-gt-xs>
              <label>{{"Ordre" | translate}}</label>
              <input ng-model="data.Ordre" type="number" ng-pattern="/^[0-9]{1,7}$/" md-autofocus required>
            </md-input-container>
          </div>

          <div flex="100" flex-gt-sm="100" layout="column">
            <md-input-container class="md-block" flex-gt-xs>
              <label>{{"Code" | translate}}</label>
              <input ng-model="data.Code" required>
            </md-input-container>
          </div>
        </div>
    </md-dialog-content>

    <md-dialog-actions layout="row" style="">
      <span flex></span>
      <md-button ng-click="AnnulerCode();" class="md-primary">
        {{"Annuler" | translate}}
      </md-button>
      <md-button ng-click="ModiferCode()">
        {{"Modifer" | translate}}
      </md-button>
    </md-dialog-actions>

  </form>
</md-dialog>
